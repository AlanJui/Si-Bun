<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>赤壁賦 - 圖文版面</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="book-container">
      <!-- 封面頁 -->
      <section class="page cover-page">
        <img
          src="./assets/img/cover.png"
          alt="前赤壁賦封面"
          class="cover-img"
        />
        <div class="cover-text">
          <h1>《前赤壁賦》</h1>
          <hr class="cover-divider" />
          <h2>北宋：蘇軾</h2>
        </div>
      </section>

      <!-- 第 1 頁 -->
      <section class="page">
        <div class="page-left">
          <img src="./assets/img/Fig-001.png" alt="插圖1" />
        </div>
        <div class="page-right">
          <div class="content-box">
            <p>
              <ruby>惟<rt>規五英</rt></ruby>
              <ruby>江<rt>江一求</rt></ruby>
              <ruby>上<rt>時二時</rt></ruby>
              <ruby>之<rt>居一曾</rt></ruby>
              <ruby>清<rt>經一出</rt></ruby>
              <ruby>風<rt>恭一喜</rt></ruby
              >，
              <ruby>與<rt>與五英</rt></ruby>
              <ruby>山<rt>干一時</rt></ruby>
              <ruby>間<rt>干一求</rt></ruby>
              <ruby>之<rt>居一曾</rt></ruby>
              <ruby>明<rt>經五門</rt></ruby>
              <ruby>月<rt>觀八語</rt></ruby
              >，
              <ruby>耳<rt>居二柳</rt></ruby>
              <ruby>得<rt>經四地</rt></ruby>
              <ruby>之<rt>居一曾</rt></ruby>
              <ruby>而<rt>居五入</rt></ruby>
              <ruby>為<rt>規七英</rt></ruby>
              <ruby>聲<rt>經一時</rt></ruby>
            </p>
          </div>
        </div>
      </section>

      <section class="page">
        <div class="page-left">
          <img src="./assets/img/Fig- 002.jpg" alt="插圖2" />
        </div>
        <div class="page-right">
          <div class="content-box">
            <p>
              <ruby>自<rt>經七曾</rt></ruby>
              <ruby>其<rt>居五求</rt></ruby>
              <ruby>不<rt>君四邊</rt></ruby>
              <ruby>變<rt>觀三邊</rt></ruby>
              <ruby>者<rt>迦二曾</rt></ruby>
              <ruby>而<rt>居五入</rt></ruby>
              <ruby>觀<rt>觀一求</rt></ruby>
              <ruby>之<rt>居一曾</rt></ruby
              >，
              <ruby>則<rt>經四曾</rt></ruby>
              <ruby>物<rt>君八門</rt></ruby>
              <ruby>與<rt>熊五英</rt></ruby>
              <ruby>我<rt>扛二語</rt></ruby>
              <ruby>皆<rt>皆一求</rt></ruby>
              <ruby>無<rt>熊五門</rt></ruby>
              <ruby>盡<rt>巾二曾</rt></ruby>
              <ruby>也<rt>迦二英</rt></ruby
              >，
              <ruby>而<rt>居五入</rt></ruby>
              <ruby>又<rt>ㄐ七英</rt></ruby>
            </p>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
